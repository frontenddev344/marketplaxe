<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Sports Jerseys & Fan Apparel | MarketPlaxe</title>

<meta name="description" content="Discover the newest jerseys, hoodies, accessories, and fan gear added to MarketPlaxe. Shop the latest marketplace arrivals today.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#f7f8fc;
color:#222;
line-height:1.7;
}

img{
max-width:100%;
display:block;
}

a{
text-decoration:none;
}

.container{
width:90%;
max-width:1250px;
margin:auto;
}

.section{
padding:80px 0;
}

.section-title{
font-size:38px;
font-weight:700;
margin-bottom:20px;
text-align:center;
}

.section-subtitle{
text-align:center;
color:#666;
margin-bottom:50px;
}

.btn{
display:inline-block;
padding:15px 35px;
border-radius:50px;
font-weight:600;
transition:.3s;
}

.btn-primary{
background:#0d6efd;
color:#fff;
}

.btn-primary:hover{
background:#084db6;
}

.btn-outline{
border:2px solid #0d6efd;
color:#0d6efd;
margin-left:15px;
}

.btn-outline:hover{
background:#0d6efd;
color:#fff;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#0d6efd,#2b7fff);
color:#fff;
padding:120px 0;
position:relative;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:rgba(255,255,255,.08);
border-radius:50%;
top:-120px;
right:-100px;
}

.hero::after{
content:"";
position:absolute;
width:250px;
height:250px;
background:rgba(255,255,255,.05);
border-radius:50%;
bottom:-100px;
left:-80px;
}

.hero-content{
position:relative;
z-index:2;
max-width:760px;
}

.hero-small{
display:inline-block;
background:rgba(255,255,255,.18);
padding:8px 18px;
border-radius:30px;
font-size:14px;
margin-bottom:20px;
}

.hero h1{
font-size:60px;
line-height:1.2;
margin-bottom:25px;
font-weight:800;
}

.hero p{
font-size:18px;
opacity:.95;
margin-bottom:40px;
}

.hero-buttons{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.hero-buttons .btn-outline{
margin-left:0;
border-color:#fff;
color:#fff;
}

.hero-buttons .btn-outline:hover{
background:#fff;
color:#0d6efd;
}

@media(max-width:768px){

.hero{
padding:90px 0;
}

.hero h1{
font-size:38px;
}

.section-title{
font-size:30px;
}

.hero-buttons{
flex-direction:column;
}

.btn{
width:100%;
text-align:center;
}

}

</style>

</head>

<body>

<!-- HERO SECTION -->

<section class="hero">

<div class="container">

<div class="hero-content">

<span class="hero-small">
Fresh Arrivals
</span>

<h1>
Discover What's New This Week
</h1>

<p>
Stay ahead of every season with the latest jerseys, hoodies, fan apparel, and accessories arriving from marketplace sellers. Explore trending products, exclusive releases, and fresh collections updated regularly.
</p>

<div class="hero-buttons">

<a href="#" class="btn btn-primary">
Shop New Drops
</a>

<a href="#" class="btn btn-outline">
Browse Collections
</a>

</div>

</div>

</div>

</section>
